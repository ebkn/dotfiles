# Supply-chain hardening: minimum release age (Yarn Berry >= 4.10.0).
# Refuse to install any npm package version published less than 3 days ago,
# matching the `min-release-age=3` window in ~/.npmrc so npm and yarn stay in
# lockstep. Malicious releases are usually detected and unpublished within
# hours-to-days, so the delay filters most compromised versions at install time.
#
# Unit is MINUTES: 4320 = 3 days. Do NOT use the "3d" duration suffix — Yarn has
# a known parsing bug that silently drops the suffix, leaving the gate disabled.
# Use npmPreapprovedPackages (name or exact locator) to exempt a package when a
# fresh release is genuinely required.
npmMinimalAgeGate: 4320
