# plugins
set -g @plugin 'tmux-plugins/tpm'
# persist environments
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# status bar
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# enable automatic restoration
set -g @continuum-restore 'on'

# set prefix key
set -g prefix C-q
unbind C-b
# send prefix to nested tmux (e.g. over SSH) with C-q C-q
bind C-q send-prefix

set-option -g history-limit 100000

# enable mouse
set-option -g mouse on

# OSC 52 clipboard forwarding
# Goal: Vim yank on SSH remote → host clipboard via OSC 52
# Chain: Neovim (OSC 52) → remote tmux → SSH → local tmux → WezTerm → macOS clipboard
#
# set-clipboard on    : accept OSC 52 from apps and forward to outer terminal
# terminal-overrides  : add Ms capability so tmux knows HOW to forward OSC 52
# terminal-features   : declare clipboard support so tmux actually forwards
#
# Pattern is screen-256color (not WezTerm*) because tmux matches against $TERM,
# not the detected terminal type. WezTerm sets term='screen-256color', and
# tmux's default-terminal also emits screen-256color for nested sessions.
set -s set-clipboard on
set-option -s terminal-overrides 'screen-256color:Tc:Ms=\E]52;%p1%s;%p2%s\007'
set-option -as terminal-features ',screen-256color:clipboard'

# color
set -g default-terminal "screen-256color"

# reduce delay
set -sg escape-time 1
set-option -g repeat-time 500

# index number
set -g base-index 1
set -g pane-base-index 1

setw -g monitor-activity on

# used for autoreading file changes at vim
set -g focus-events on

# session
# create new session
bind N new-session -c '#{pane_current_path}'

# window
# disable tmux window hotkeys (managed by WezTerm tabs)
unbind c
unbind n
unbind p
# close current window (for WezTerm Cmd+W)
bind-key -n F12 kill-window
# split window
bind v split-window -h -c '#{pane_current_path}'
bind s split-window -v -c '#{pane_current_path}'

# pane
# select pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# resize pane
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2
# remove pane
bind q confirm-before -p "kill-pane? (y/n)" kill-pane
bind p display-popup -E -d "#{pane_current_path}" -w 80% -h 80% 'tmux new-session -A -s _popup -c "#{pane_current_path}"'
bind t display-popup -E -d "#{pane_current_path}" -w 80% -h 80% 'tmux new-session -A -s _tig -c "#{pane_current_path}" tig'
bind g display-popup -E -d "#{pane_current_path}" -w 30 -h 3 'echo " Opening GitHub..." && (gh pr view --web 2>/dev/null || gh repo view --web) >/dev/null 2>&1; sleep 1'

# copy
bind u copy-mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
# pbcopy handles local clipboard; over SSH, set-clipboard (OSC 52) takes over
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi M-c send-keys -X copy-pipe "pbcopy"

# Exit copy mode with Escape or Ctrl-C
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi C-c send-keys -X cancel
# status bar
set -g status-style 'bg=black fg=white'
set-option -g status-position top
set-option -g status-left-length 300
set-option -g status-right-length 300
set-option -g status-left '#{?@ssh_host,#[bg=#3b2d5e fg=#bb9af7] SSH: #{@ssh_host}  #[default],}#{pane_current_path}'
set-option -g status-right '%Y-%m-%d(%a) %H:%M'
set-option -g status-interval 3 # refresh interval
set-option -g status-justify centre
set-option -g automatic-rename off
set-option -g allow-rename off
# propagate window title to terminal (WezTerm tab name)
set -g set-titles on
set -g set-titles-string '#{window_name}'
# Update window name with unique pane directory basenames.
# These hooks also cover the initial title on new windows/sessions,
# so zsh's chpwd hook skips calling tmux-pane-titles at shell startup.
set-hook -g after-new-window    'run-shell "~/.local/bin/tmux-pane-titles"'
set-hook -g after-new-session   'run-shell "~/.local/bin/tmux-pane-titles"'
set-hook -g after-split-window  'run-shell "~/.local/bin/tmux-pane-titles"'
set-hook -g pane-exited         'run-shell "~/.local/bin/tmux-pane-titles"'

# pane borders
set -g pane-border-lines heavy           # thick Unicode box-drawing characters
set -g pane-border-indicators both       # colour + arrows to indicate active pane
set -g pane-border-style 'fg=#363636'
# SSH pane: purple border, otherwise: green
set -g pane-active-border-style '#{?@ssh_host,fg=#bb9af7,fg=green}'

# Initialize tmux plugin manager (this should be the end of config)
run '~/.tmux/plugins/tpm/tpm'
